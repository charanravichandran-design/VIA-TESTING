# ═══════════════════════════════════════════════════════════════════════
#  config.ini  —  Unified config for the hybrid Go + Python setup
#
#  Used by BOTH:
#    ./vector_bench  --config config.ini   (Go binary)
#    python3 optuna_tuner.py --config config.ini  (Python)
#
#  Sections used by Go (vector_bench):
#    [connection], [dataset], [index], [index_creation],
#    [query], [benchmark], [loading], [output]
#
#  Sections used by Python (optuna_tuner.py):
#    [optuna], [index_params], [query_params], [tuner_output]
#    (It also passes [connection], [dataset] to Go via --config)
# ═══════════════════════════════════════════════════════════════════════


# ───────────────────────────────────────────────────────────────────────
# [connection]
# ───────────────────────────────────────────────────────────────────────
[connection]

connection_string =
username          =
password          =
bucket            =
scope             =
collection        =


# ───────────────────────────────────────────────────────────────────────
# [dataset]
# ───────────────────────────────────────────────────────────────────────
[dataset]

query_vectors_path =
ground_truth_path  =
data_path          =
scalar_fields_path =
query_filters_path =

[s3]

region            =
endpoint          =
access_key_id     =
secret_access_key =


# ───────────────────────────────────────────────────────────────────────
# [index]
# ───────────────────────────────────────────────────────────────────────
[index]

index_type   =
index_name   =
vector_field =
scalar_fields =
include_fields =
where_clause  =


# ───────────────────────────────────────────────────────────────────────
# [index_creation]  — Default index build params
#                     Optuna overrides these per trial.
# ───────────────────────────────────────────────────────────────────────
[index_creation]

dimension           =
similarity          =
description         =
nlist               =
train_list          =
num_replica         =
persist_full_vector =
defer_build         =


# ───────────────────────────────────────────────────────────────────────
# [query]  — Default query params
#            Optuna overrides these per trial.
# ───────────────────────────────────────────────────────────────────────
[query]

top_k      =
nprobes    =
reranking  =
top_n_scan =
where_clause      =


# ───────────────────────────────────────────────────────────────────────
# [benchmark]
# ───────────────────────────────────────────────────────────────────────
[benchmark]

warmup_seconds       = 30
steady_state_seconds = 120
workers              = 16
query_timeout_ms     =


# ───────────────────────────────────────────────────────────────────────
# [loading]
# ───────────────────────────────────────────────────────────────────────
[loading]

skip_load       =
skip_index      =
load_batch_size = 100
load_workers    = 16
doc_id_prefix   =


# ───────────────────────────────────────────────────────────────────────
# [output]  — Go binary single-run output
# ───────────────────────────────────────────────────────────────────────
[output]

output_json =


# ───────────────────────────────────────────────────────────────────────
# [results_s3]  — Optional upload target for output artifacts
#                 (separate from [s3] dataset source config)
# ───────────────────────────────────────────────────────────────────────
[results_s3]

enabled           = false
bucket            =
prefix            =
region            =
endpoint          =
access_key_id     =
secret_access_key =


# ═══════════════════════════════════════════════════════════════════════
#  OPTUNA SECTIONS  (used only by optuna_tuner.py)
# ═══════════════════════════════════════════════════════════════════════

[optuna]

